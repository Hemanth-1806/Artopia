<!DOCTYPE html>
<html>
<head>
    <title>Capitals of Countries</title>

    <style>
        #capt {
            color: red;
            font-weight: bold;
            font-size: 50px;
        }

        .label {
            color: green;
            font-size: 24px;
            font-weight: bold;
        }
    </style>

    <script>
        function showCapital() {
            var country = document.forms["frm1"].country.value;
            var capital = "Please select a country";

            switch (country) {
                case "india":
                    capital = "NEW DELHI";
                    break;
                case "china":
                    capital = "BEIJING";
                    break;
                case "usa":
                    capital = "WASHINGTON DC";
                    break;
                case "bangladesh":
                    capital = "DHAKA";
                    break;
                case "japan":
                    capital = "TOKYO";
                    break;
            }

            document.getElementById("capt").innerHTML = capital;
        }
    </script>
</head>

<body>
    <form name="frm1">
        <center>
            <br>
            Select a Country :
            <select name="country" onchange="showCapital()">
                <option value="">--SELECT--</option>
                <option value="india">INDIA</option>
                <option value="china">CHINA</option>
                <option value="usa">USA</option>
                <option value="bangladesh">BANGLADESH</option>
                <option value="japan">JAPAN</option>
            </select>

            <br><br>

            <span class="label">Capital is :</span>
            <p id="capt"></p>
        </center>
    </form>
</body>
</html>
